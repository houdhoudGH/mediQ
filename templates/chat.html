<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediQ — Medical Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
    <div class="app">
        <div class="chat-window">
            <!-- Header -->
            <header class="chat-header">
                <div class="brand">
                    <div class="avatar">
                        <i class="fa-solid fa-stethoscope"></i>
                        <span class="online-dot"></span>
                    </div>
                    <div class="brand-text">
                        <div class="brand-name">MediQ</div>
                        <div class="brand-sub">Medical assistant · Online</div>
                    </div>
                </div>
                <button id="clearBtn" class="header-btn" title="Start a new conversation">
                    <i class="fa-solid fa-rotate-right"></i>
                    <span>New chat</span>
                </button>
            </header>

            <!-- Messages -->
            <div id="messages" class="messages">
                <!-- Welcome message -->
                <div class="msg msg-bot">
                    <div class="msg-avatar">
                        <i class="fa-solid fa-stethoscope"></i>
                    </div>
                    <div class="msg-content">
                        <div class="msg-bubble">
                            Hello! I'm <strong>MediQ</strong>, your medical assistant. How can I help you today?
                        </div>
                        <div class="msg-time"></div>
                    </div>
                </div>

                <!-- Starter prompts -->
                <div id="starters" class="starters">
                    <div class="starters-label">Try asking</div>
                    <div class="starters-grid">
                        <button class="starter" data-q="What causes a heart attack?">
                            <i class="fa-solid fa-heart-pulse"></i>
                            <span>What causes a heart attack?</span>
                        </button>
                        <button class="starter" data-q="What are the side effects of ibuprofen?">
                            <i class="fa-solid fa-pills"></i>
                            <span>Side effects of ibuprofen?</span>
                        </button>
                        <button class="starter" data-q="What are the symptoms of diabetes?">
                            <i class="fa-solid fa-droplet"></i>
                            <span>Symptoms of diabetes?</span>
                        </button>
                        <button class="starter" data-q="How does asthma affect the lungs?">
                            <i class="fa-solid fa-lungs"></i>
                            <span>How does asthma work?</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Input area -->
            <div class="input-area">
                <form id="messageForm" class="input-bar">
                    <input
                        type="text"
                        id="textInput"
                        name="msg"
                        placeholder="Ask a medical question..."
                        autocomplete="off"
                        required
                    />
                    <button type="submit" id="sendBtn" aria-label="Send">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </form>
                <div class="disclaimer">
                    MediQ provides general information. Always consult a doctor for medical advice.
                </div>
            </div>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById("messages");
        const formEl = document.getElementById("messageForm");
        const inputEl = document.getElementById("textInput");
        const clearBtn = document.getElementById("clearBtn");

        // ===== Time formatting =====
        function nowTime() {
            const d = new Date();
            const h = String(d.getHours()).padStart(2, "0");
            const m = String(d.getMinutes()).padStart(2, "0");
            return `${h}:${m}`;
        }

        // Set timestamp on the welcome message
        document.querySelector(".msg-bot .msg-time").textContent = nowTime();

        // ===== Render a message =====
        function appendUserMessage(text) {
            const wrap = document.createElement("div");
            wrap.className = "msg msg-user";
            wrap.innerHTML = `
                <div class="msg-content">
                    <div class="msg-bubble">${escapeHtml(text)}</div>
                    <div class="msg-time">${nowTime()}</div>
                </div>
            `;
            messagesEl.appendChild(wrap);
            scrollToBottom();
        }

        function appendBotMessage(text) {
            const wrap = document.createElement("div");
            wrap.className = "msg msg-bot";
            // Render markdown safely
            const rendered = marked.parse(text);
            wrap.innerHTML = `
                <div class="msg-avatar">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
                <div class="msg-content">
                    <div class="msg-bubble">${rendered}</div>
                    <div class="msg-time">${nowTime()}</div>
                </div>
            `;
            messagesEl.appendChild(wrap);
            scrollToBottom();
        }

        // ===== Typing indicator =====
        function showTyping() {
            const wrap = document.createElement("div");
            wrap.className = "msg msg-bot typing";
            wrap.id = "typingIndicator";
            wrap.innerHTML = `
                <div class="msg-avatar">
                    <i class="fa-solid fa-stethoscope"></i>
                </div>
                <div class="msg-content">
                    <div class="msg-bubble typing-bubble">
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                </div>
            `;
            messagesEl.appendChild(wrap);
            scrollToBottom();
        }
        function hideTyping() {
            const t = document.getElementById("typingIndicator");
            if (t) t.remove();
        }

        // ===== Utilities =====
        function scrollToBottom() {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }
        function escapeHtml(str) {
            return str
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }
        function hideStarters() {
            const s = document.getElementById("starters");
            if (s) s.style.display = "none";
        }

        // ===== Send a message =====
        async function sendMessage(text) {
            if (!text.trim()) return;
            hideStarters();
            appendUserMessage(text);
            inputEl.value = "";
            showTyping();

            try {
                const formData = new FormData();
                formData.append("msg", text);
                const res = await fetch("/get", { method: "POST", body: formData });
                const reply = await res.text();
                hideTyping();
                appendBotMessage(reply);
            } catch (err) {
                hideTyping();
                appendBotMessage("Sorry, something went wrong. Please try again.");
                console.error(err);
            }
        }

        formEl.addEventListener("submit", (e) => {
            e.preventDefault();
            sendMessage(inputEl.value);
        });

        // Starter buttons
        document.querySelectorAll(".starter").forEach((btn) => {
            btn.addEventListener("click", () => {
                sendMessage(btn.dataset.q);
            });
        });

        // Clear chat
        clearBtn.addEventListener("click", () => {
            // Remove all messages except the welcome (first one) and re-show starters
            const all = messagesEl.querySelectorAll(".msg");
            all.forEach((m, i) => {
                if (i > 0) m.remove();
            });
            const s = document.getElementById("starters");
            if (s) s.style.display = "";
            inputEl.focus();
        });

        // Auto-focus input on load
        inputEl.focus();
    </script>
</body>
</html>
